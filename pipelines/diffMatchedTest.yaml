description: |
  Test out if this runs using the middleware
tasks:
  diff_matched_analysis:
    class: lsst.analysis.tools.tasks.diffMatchedAnalysis.DiffMatchedAnalysisTask
    config:
      bands: ('r', 'i')
      # bands: ('u', 'g', 'r', 'i', 'z', 'y')
      connections.outputName: diff_matched_truth_summary_objectTable_tract
      # set plots to run
      # plots.matchedRefCModelMagPlot: MatchedRefCoaddCModelFluxPlot

      # set metrics to run
      # metrics.matchedRefCModelFluxMetric: MatchedRefCoaddDiffCModelFluxMetric

      python: |
        from lsst.analysis.tools.analysisMetrics.diffMatchedMetrics import (
          MatchedRefCoaddCModelFluxMetric,
          MatchedRefCoaddPositionMetric,
        )

        from lsst.analysis.tools.analysisPlots.diffMatchedPlots import (
          MatchedRefCoaddCModelFluxPlot,
          MatchedRefCoaddPositionPlot,
        )

        from lsst.analysis.tools.contexts._contexts import (
          MatchedRefDiffContext,
          MatchedRefChiContext,
        )

        config.plots.matchedRefCModelMagPlot = MatchedRefCoaddCModelFluxPlot()
        config.plots.matchedRefCModelMagPlot.applyContext(MatchedRefDiffContext)

        config.plots.matchedRefCModeFluxChiPlot = MatchedRefCoaddCModelFluxPlot()
        config.plots.matchedRefCModeFluxChiPlot.applyContext(MatchedRefChiContext)

        config.metrics.matchedRefCModelMagMetric = MatchedRefCoaddCModelFluxMetric()
        config.metrics.matchedRefCModelMagMetric.applyContext(MatchedRefDiffContext)

        config.metrics.matchedRefCModelFluxChiMetric = MatchedRefCoaddCModelFluxMetric()
        config.metrics.matchedRefCModelFluxChiMetric.applyContext(MatchedRefChiContext)

        config.plots.matchedRefPositionXPlot = MatchedRefCoaddPositionPlot(variable="x")
        config.plots.matchedRefPositionXPlot.applyContext(MatchedRefDiffContext)

        config.plots.matchedRefPositionXChiPlot = MatchedRefCoaddPositionPlot(variable="x")
        config.plots.matchedRefPositionXChiPlot.applyContext(MatchedRefChiContext)

        config.metrics.matchedRefPositionXMetric = MatchedRefCoaddPositionMetric(variable="x")
        config.metrics.matchedRefPositionXMetric.applyContext(MatchedRefDiffContext)

        config.metrics.matchedRefPositionXChiMetric = MatchedRefCoaddPositionMetric(variable="x")
        config.metrics.matchedRefPositionXChiMetric.applyContext(MatchedRefChiContext)

        config.plots.matchedRefPositionYPlot = MatchedRefCoaddPositionPlot(variable="y")
        config.plots.matchedRefPositionYPlot.applyContext(MatchedRefDiffContext)

        config.plots.matchedRefPositionYChiPlot = MatchedRefCoaddPositionPlot(variable="y")
        config.plots.matchedRefPositionYChiPlot.applyContext(MatchedRefChiContext)

        config.metrics.matchedRefPositionYMetric = MatchedRefCoaddPositionMetric(variable="y")
        config.metrics.matchedRefPositionYMetric.applyContext(MatchedRefDiffContext)

        config.metrics.matchedRefPositionYChiMetric = MatchedRefCoaddPositionMetric(variable="y")
        config.metrics.matchedRefPositionYChiMetric.applyContext(MatchedRefChiContext)
