lsst.analysis.tools.tasks.objectTableTractAnalysis.ObjectTableTractAnalysisTask:
  atools:
    validPsfFluxMetric:
      '{band}_validFracColumn':
        metricTypes:
        - coadd
        - photometry
        description: Fraction (in percent) of objects in the specified band coadd object
          table with PSF flux values that fall within the range [0.1, 1e9] nJy, indicating
          numerically valid and physically plausible flux measurements.
      '{band}_nanFracColumn':
        metricTypes:
        - coadd
        - photometry
        description: Fraction (in percent) of objects in the specified band coadd object
          table with NaN PSF flux values, measuring the rate of missing or failed
          PSF flux measurements.
    validCmodelFluxMetric:
      '{band}_validFracColumn':
        metricTypes:
        - coadd
        - photometry
        description: Fraction (in percent) of objects in the specified band coadd object
          table with CModel flux values that fall within the range [0.1, 1e9] nJy,
          indicating numerically valid and physically plausible flux measurements.
      '{band}_nanFracColumn':
        metricTypes:
        - coadd
        - photometry
        description: Fraction (in percent) of objects in the specified band coadd object
          table with NaN CModel flux values, measuring the rate of missing or failed
          CModel flux measurements.
lsst.analysis.tools.tasks.refCatObjectPhotometricAnalysis.RefCatObjectPhotometricAnalysisTask:
  atools:
    photomDiffMetrics:
      '{band}_ref_photom_offset_coadd':
        metricTypes:
        - coadd
        - photometry
        description: Median photometric offset in millimagnitudes between PSF magnitudes
          of bright stars in the specified band coadd object table and the reference
          catalog, after applying coadd-context quality cuts (stars, mag 17-21.5,
          S/N > 200).
      '{band}_ref_photom_offset_mean_coadd':
        metricTypes:
        - coadd
        - photometry
        description: Mean photometric offset in millimagnitudes between PSF magnitudes
          of bright stars in the specified band coadd object table and the reference
          catalog.
      '{band}_ref_photom_offset_stdev_coadd':
        metricTypes:
        - coadd
        - photometry
        description: Standard deviation in millimagnitudes of the photometric offsets
