lsst.analysis.tools.tasks.sourceObjectTableAnalysis.SourceObjectTableAnalysisTask:
  atools:
    astromColorDiffMetrics:
      AB1_RA:
        metricTypes:
        - visit
        - astrometry
        description: RMS astrometric offset in RA (RA*cos(Dec), in milliarcseconds)
          between bright isolated stars in the visit-level source catalog and their
          matched coadd object positions, for stars with magnitude 17-21.5. This is
          the AB1 metric measuring absolute astrometric accuracy in the RA direction
          against the object catalog.
      ABF1_RA:
        metricTypes:
        - visit
        - astrometry
        description: Fraction (in percent) of visit-to-object RA astrometric separations
          that deviate by more than 20 mas from the median, measuring the outlier
          rate of absolute astrometric accuracy in the RA direction (ABF1 metric).
      AB1_Dec:
        metricTypes:
        - visit
        - astrometry
        description: RMS astrometric offset in Dec (in milliarcseconds) between bright
          isolated stars in the visit-level source catalog and their matched coadd
          object positions, for stars with magnitude 17-21.5.
      ABF1_Dec:
        metricTypes:
        - visit
        - astrometry
        description: Fraction (in percent) of visit-to-object Dec astrometric separations
          that deviate by more than 20 mas from the median, measuring the outlier
          rate of absolute astrometric accuracy in the Dec direction.
      AB1_tot:
        metricTypes:
        - visit
        - astrometry
        description: RMS total angular separation in milliarcseconds between bright
          isolated stars in the visit-level source catalog and their matched coadd
          object positions (using full spherical geometry), for stars with magnitude
          17-21.5.
      ABF1_tot:
        metricTypes:
        - visit
        - astrometry
        description: Fraction (in percent) of total visit-to-object angular separations
          exceeding 20 mas, measuring the outlier rate of absolute astrometric accuracy
          in total angular separation.
