  lsst.analysis.tools.tasks.objectTableTractAnalysis.ObjectTableTractAnalysisTask:
    atools:
      parentDeblenderMetrics:
        numParents:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Total number of parent objects (blended footprints) processed
            by the deblender in the coadd object table (dimensionless count).
          sided: one
        numDeblendFailed:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of parent objects for which the deblender failed to
            produce valid child models in the coadd object table (dimensionless count).
          sided: one
        numIncompleteData:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of parent objects flagged as having incomplete input
            data during deblending (deblend_incompleteData flag) in the coadd object
            table (dimensionless count).
          sided: one
        numDetectedPeaks:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Total number of detected peaks across all parent objects passed
            to the deblender (sum of deblend_nPeaks) in the coadd object table (dimensionless
            count).
          sided: one
        numDeblendedChildren:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Total number of deblended child objects produced by the deblender
            (sum of deblend_nChild) in the coadd object table (dimensionless count).
          sided: one
        numPeakDropouts:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Total number of detected peaks that were not accounted for
            by either a deblended child or an isolated parent — ideally zero (dimensionless
            count).
          sided: one
        propPeakDropouts:
          units: ''
          metricTypes:
          - coadd
          - deblend
          description: Proportion of detected peaks that were dropped by the deblender
            (numPeakDropouts / numDetectedPeaks), expressed as a dimensionless fraction.
            Values near zero indicate good deblender completeness.
          sided: one
      skippedDeblenderMetrics:
        numSkippedBlends:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of parent objects that were skipped by the deblender
            (deblend_skipped flag set, deblend_failed and deblend_skipped_isolatedParent
            not set) in the coadd object table (dimensionless count).
          sided: one
        numBlendParentTooBig:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of blends skipped because the parent footprint was too
            large (deblend_skipped_parentTooBig flag) in the coadd object table (dimensionless
            count).
          sided: one
        numBlendTooManyPeaks:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of blends skipped because the footprint contained too
            many peaks (deblend_skipped_tooManyPeaks flag) in the coadd object table
            (dimensionless count).
          sided: one
        numBlendTooManyMasked:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of blends skipped because too many pixels in the footprint
            were masked (deblend_skipped_masked flag) in the coadd object table (dimensionless
            count).
          sided: one
        numSkippedPeaks:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Total number of peaks within blends that were skipped by the
            deblender (sum of deblend_nPeaks for skipped blends) in the coadd object
            table (dimensionless count).
          sided: one
      blendMetrics:
        numBlends:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of parent objects successfully deblended into more than
            one child (deblend_nChild > 1) in the coadd object table (dimensionless
            count).
          sided: one
        meanBlendIterations:
          units: ''
          metricTypes:
          - coadd
          - deblend
          description: Mean number of scarlet_lite iterations required to converge
            for multi-child blends in the coadd object table (dimensionless). High
            values may indicate deblender performance issues.
          sided: one
        meanBlendChi2:
          units: ''
          metricTypes:
          - coadd
          - deblend
          description: Mean deblender chi-squared value for multi-child blends in
            the coadd object table (dimensionless). Values far from 1 may indicate
            poor model fits.
          sided: one
      isolatedDeblenderMetrics:
        numIsolated:
          units: ''
          metricTypes:
          - coadd
          - deblend
          - counts
          description: Number of parent objects deblended into exactly one child (isolated
            objects with deblend_nChild == 1) in the coadd object table (dimensionless
            count).
          sided: one
        meanIsolatedIterations:
          units: ''
          metricTypes:
          - coadd
          - deblend
          description: Mean number of scarlet_lite iterations required to converge
            for isolated (single-child) objects in the coadd object table (dimensionless).
          sided: one
        meanIsolatedChi2:
          units: ''
          metricTypes:
